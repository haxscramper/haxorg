name: Readme run library

on:
  push:
  workflow_dispatch:

jobs:
  uv-test:
    runs-on: ubuntu-latest
    container: fedora:latest

    steps:
      - run: dnf -y install git python3 python3-devel python3-pip curl cmake ninja-build clang conan which unzip wget

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - run: git config --global safe.directory "*"
      - run: mkdir -p ~/.conan2/profiles
      - run: cp scripts/py_ci/py_ci/conan_default_profile.ini ~/.conan2/profiles/default

      - name: Create example project and install local package
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          rm -rf /tmp/uv-example
          mkdir /tmp/uv-example
          cd /tmp/uv-example

          uv init --no-workspace
          uv add "${{ github.workspace }}/scripts/py_haxorg"
          cp "${{ github.workspace }}/.github/scripts/uv_example_main.py" ./main.py

      - name: Verify package can be imported and used
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          cd /tmp/uv-example
          uv run main.py
