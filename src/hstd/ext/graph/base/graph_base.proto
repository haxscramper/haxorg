syntax = "proto3";
import "google/protobuf/struct.proto";
import "google/protobuf/any.proto";

package hstd.graph;


message IAttribute {
  string type = 1;
  google.protobuf.Any payload = 2;
}

message IVertex {
  string stable_id = 1;
  string type = 2;
  repeated IAttribute attributes = 3;
  google.protobuf.Any payload = 4;
}

message IEdge {
  string stable_id = 1;
  string type = 2;
  string source_vertex_id = 3;
  string target_vertex_id = 4;
  repeated IAttribute attributes = 5;
  google.protobuf.Any payload = 6;
}

message IEdgeCollection {
  string stable_id = 1;
  string type = 2;
  repeated IEdge edges = 3;
  google.protobuf.Any payload = 4;
}

message VertexIDVec {
  repeated string vertices = 1;
}

message IVertexHierarchy {
  string stable_id = 1;
  string type = 2;
  repeated string root_vertex_ids = 3;
  map<string, string> parent_map = 4;
  map<string, bool> vertex_set = 5;
  map<string, VertexIDVec> nested_in_map = 6;
  repeated IEdge edges = 7;
  google.protobuf.Any payload = 8;
}

message IGraphProto {
  repeated IEdgeCollection collections = 1;
  repeated IVertexHierarchy hierarchies = 2;
  repeated IVertex vertices = 3;
  google.protobuf.Any payload = 4;
}
