syntax = "proto3";

package hstd.ext.geometry.proto;

message Rect {
  double x = 1;
  double y = 2;
  double width = 3;
  double height = 4;
}

message Point {
  double x = 1;
  double y = 2;
}

message Path {
  enum CommandType {
    COMMAND_TYPE_UNSPECIFIED = 0;
    MOVE_TO = 1;
    LINE_TO = 2;
    QUAD_TO = 3;
    CUBIC_TO = 4;
    CLOSE_SUBPATH = 5;
  }

  message Command {
    CommandType type = 1;
    Point p1 = 2;
    Point p2 = 3;
    Point p3 = 4;
  }

  repeated Command commands = 1;
}

message Polygon {
  repeated Point points = 1;
}
